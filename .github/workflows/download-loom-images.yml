name: Download Loom SOP Images
on:
  workflow_dispatch:
jobs:
  download-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Loom screenshots
        run: |
          mkdir -p assets
          curl -L -o assets/step-01-architecture-0000.jpg "https://loom.com/i/2a19d875c9664e369700e16317a9ba6f?workflows_screenshot=true" || true
          curl -L -o assets/step-02-vnet-subnets-0110.jpg "https://loom.com/i/4855488252bc468aa6ea7f870336f5bd?workflows_screenshot=true" || true
          curl -L -o assets/step-03-web-server-vm-0351.jpg "https://loom.com/i/adf03e2c84164563a275a1cc1cacd659?workflows_screenshot=true" || true
          curl -L -o assets/step-04-db-vm-no-public-ip-0542.jpg "https://loom.com/i/e6b9b9911e19416c9ba044db87b22b69?workflows_screenshot=true" || true
          curl -L -o assets/step-05-verify-deployment-0655.jpg "https://loom.com/i/89b4b58d7c6243d0956cae0c8b058630?workflows_screenshot=true" || true
          curl -L -o assets/step-06-connect-web-server-0747.jpg "https://loom.com/i/fe738cb568d942abbe9a453c893f6b3d?workflows_screenshot=true" || true
          curl -L -o assets/step-07-access-db-via-jump-0855.jpg "https://loom.com/i/a9ef7158a04a46d48f54cd3cb232e1c9?workflows_screenshot=true" || true
          curl -L -o assets/step-08-nsg-rule-1001.jpg "https://loom.com/i/c5b36596fa2a478a93771085c09c5fdf?workflows_screenshot=true" || true
          curl -L -o assets/step-09-final-security-1130.jpg "https://loom.com/i/4b5d7e06fb0a42c1b44d44c7f040ad2c?workflows_screenshot=true" || true
          ls -la assets/

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/step-*.jpg
          git diff --cached --stat
          git commit -m "Add Loom SOP screenshots to assets folder" || echo "Nothing to commit"
          git push
