name: Download Loom SOP Images

on:
  workflow_dispatch:

  jobs:
    download-images:
        runs-on: ubuntu-latest
            permissions:
                  contents: write
                      steps:
                            - name: Checkout repository
                                    uses: actions/checkout@v4

                                          - name: Download Loom screenshots
                                                  run: |
                                                            mkdir -p assets
                                                                      declare -A images=(
                                                                                  ["step-01-architecture-0000.jpg"]="2a19d875c9664e369700e16317a9ba6f"
                                                                                              ["step-02-vnet-subnets-0110.jpg"]="4855488252bc468aa6ea7f870336f5bd"
                                                                                                          ["step-03-web-server-vm-0351.jpg"]="adf03e2c84164563a275a1cc1cacd659"
                                                                                                                      ["step-04-db-vm-no-public-ip-0542.jpg"]="e6b9b9911e19416c9ba044db87b22b69"
                                                                                                                                  ["step-05-verify-deployment-0655.jpg"]="89b4b58d7c6243d0956cae0c8b058630"
                                                                                                                                              ["step-06-connect-web-server-0747.jpg"]="fe738cb568d942abbe9a453c893f6b3d"
                                                                                                                                                          ["step-07-access-db-via-jump-0855.jpg"]="a9ef7158a04a46d48f54cd3cb232e1c9"
                                                                                                                                                                      ["step-08-nsg-rule-1001.jpg"]="c5b36596fa2a478a93771085c09c5fdf"
                                                                                                                                                                                  ["step-09-final-security-1130.jpg"]="4b5d7e06fb0a42c1b44d44c7f040ad2c"
                                                                                                                                                                                            )
                                                                                                                                                                                                      for filename in "${!images[@]}"; do
                                                                                                                                                                                                                  id="${images[$filename]}"
                                                                                                                                                                                                                              echo "Downloading $filename (ID: $id)..."
                                                                                                                                                                                                                                          curl -L -o "assets/$filename" \
                                                                                                                                                                                                                                                        -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
                                                                                                                                                                                                                                                                      "https://loom.com/i/${id}?workflows_screenshot=true" || true
                                                                                                                                                                                                                                                                                  if [ -f "assets/$filename" ] && [ -s "assets/$filename" ]; then
                                                                                                                                                                                                                                                                                                echo "Successfully downloaded $filename ($(du -h assets/$filename | cut -f1))"
                                                                                                                                                                                                                                                                                                            else
                                                                                                                                                                                                                                                                                                                          echo "Failed to download $filename"
                                                                                                                                                                                                                                                                                                                                      fi
                                                                                                                                                                                                                                                                                                                                                done
                                                                                                                                                                                                                                                                                                                                                          ls -la assets/
                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                - name: Update sop.md with local image paths
                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                  sed -i 's|!\[generated-image-at-00:00:00\](https://loom.com/i/2a19d875c9664e369700e16317a9ba6f?workflows_screenshot=true)|![Step 1 - Define Azure architecture](assets/step-01-architecture-0000.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                            sed -i 's|!\[generated-image-at-00:01:10\](https://loom.com/i/4855488252bc468aa6ea7f870336f5bd?workflows_screenshot=true)|![Step 2 - Create virtual network and subnets](assets/step-02-vnet-subnets-0110.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                      sed -i 's|!\[generated-image-at-00:03:51\](https://loom.com/i/adf03e2c84164563a275a1cc1cacd659?workflows_screenshot=true)|![Step 3 - Deploy web server VM](assets/step-03-web-server-vm-0351.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                sed -i 's|!\[generated-image-at-00:05:42\](https://loom.com/i/e6b9b9911e19416c9ba044db87b22b69?workflows_screenshot=true)|![Step 4 - Deploy database VM without public access](assets/step-04-db-vm-no-public-ip-0542.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                          sed -i 's|!\[generated-image-at-00:06:55\](https://loom.com/i/89b4b58d7c6243d0956cae0c8b058630?workflows_screenshot=true)|![Step 5 - Verify two-tier deployment](assets/step-05-verify-deployment-0655.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                    sed -i 's|!\[generated-image-at-00:07:47\](https://loom.com/i/fe738cb568d942abbe9a453c893f6b3d?workflows_screenshot=true)|![Step 6 - Connect to web server VM](assets/step-06-connect-web-server-0747.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                              sed -i 's|!\[generated-image-at-00:08:55\](https://loom.com/i/a9ef7158a04a46d48f54cd3cb232e1c9?workflows_screenshot=true)|![Step 7 - Access database VM via jump host](assets/step-07-access-db-via-jump-0855.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                        sed -i 's|!\[generated-image-at-00:10:01\](https://loom.com/i/c5b36596fa2a478a93771085c09c5fdf?workflows_screenshot=true)|![Step 8 - Restrict database access with NSG rule](assets/step-08-nsg-rule-1001.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  sed -i 's|!\[generated-image-at-00:11:30\](https://loom.com/i/4b5d7e06fb0a42c1b44d44c7f040ad2c?workflows_screenshot=true)|![Step 9 - Confirm final security posture](assets/step-09-final-security-1130.jpg)|g' sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Updated sop.md"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      grep -n "assets/" sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Commit and push images and updated sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git config --local user.email "action@github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git config --local user.name "GitHub Action"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git add assets/step-*.jpg sop.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git diff --cached --stat
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git commit -m "Add Loom SOP screenshots to assets and update sop.md" || echo "Nothing to commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git push
